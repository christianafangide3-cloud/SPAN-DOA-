<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splendid's Academy | Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#020617',    /* Slate 950 */
                            card: '#0f172a',    /* Slate 900 */
                            accent: '#06b6d4',  /* Cyan 500 */
                            glow: '#38bdf8',    /* Sky 400 */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Premium Glassmorphism */
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-glow {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
            transform: translateY(-2px);
        }

        .btn-glow-success {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        .btn-glow-success:hover {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
            transform: translateY(-2px);
        }

        /* Ambient Background Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        .bg-flare {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.35;
            animation: float 8s ease-in-out infinite alternate;
        }
        
        /* Custom Input Autofill Override for Dark Mode */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Ambient Background -->
    <div class="bg-flare bg-cyan-900 w-[500px] h-[500px] top-[-10%] left-[-10%]"></div>
    <div class="bg-flare bg-blue-900 w-[600px] h-[600px] bottom-[-20%] right-[-10%]" style="animation-delay: -3s;"></div>

    <div class="max-w-md w-full glass-panel rounded-3xl overflow-hidden relative fade-in z-10">
        
        <!-- Loading Overlay -->
        <div id="loading" class="hidden absolute inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
            <div class="animate-spin rounded-full h-14 w-14 border-t-2 border-b-2 border-cyan-400 mb-4"></div>
            <p class="text-sm font-bold text-cyan-400 animate-pulse tracking-widest uppercase">Authenticating...</p>
        </div>

        <!-- Header -->
        <div class="p-8 text-center relative overflow-hidden pb-6">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-[40px]"></div>
            <div class="w-16 h-16 mx-auto bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-[0_0_20px_rgba(6,182,212,0.4)] mb-4 transform rotate-3">
                <i class="fas fa-fingerprint -rotate-3"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-1">Splendid's Academy</h1>
            <p class="text-cyan-400 text-[10px] font-mono uppercase tracking-[0.3em]">Secure Academic Portal</p>
        </div>

        <!-- Dynamic Target Countdown Banner -->
        <div id="countdown-banner" class="bg-slate-950/60 border-y border-cyan-500/20 py-4 text-center hidden">
            <div class="flex items-center justify-center gap-2 mb-1">
                <div class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Next Target: <span id="next-exam-name" class="text-cyan-400">LOADING...</span></span>
            </div>
            <div id="index-countdown" class="text-2xl font-mono font-black text-white tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">--:--:--</div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-white/5 bg-slate-900/30">
            <button onclick="toggleForm('login')" id="tab-login" class="flex-1 py-4 text-sm font-bold text-cyan-400 border-b-2 border-cyan-400 bg-slate-800/50 transition-all">Sign In</button>
            <button onclick="toggleForm('signup')" id="tab-signup" class="flex-1 py-4 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all">Sign Up</button>
        </div>

        <div class="p-8">
            
            <!-- Message Box -->
            <div id="auth-message" class="hidden"></div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Clearance Email</label>
                    <div class="flex items-center border border-slate-700 rounded-xl px-4 bg-slate-900/50 focus-within:border-cyan-400 focus-within:ring-1 focus-within:ring-cyan-400/50 transition-all">
                        <i class="fas fa-envelope text-slate-500"></i>
                        <input type="email" id="login-email" required class="w-full p-4 outline-none text-sm font-medium bg-transparent text-white placeholder-slate-600" placeholder="davies@uniuyo.edu.ng">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Access Key</label>
                    <div class="flex items-center border border-slate-700 rounded-xl px-4 bg-slate-900/50 focus-within:border-cyan-400 focus-within:ring-1 focus-within:ring-cyan-400/50 transition-all">
                        <i class="fas fa-lock text-slate-500"></i>
                        <input type="password" id="login-password" required class="w-full p-4 outline-none text-sm font-medium bg-transparent text-white placeholder-slate-600 tracking-widest" placeholder="••••••••">
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full btn-glow text-white font-bold py-4 rounded-xl uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                       Login <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
                <p class="text-center text-xs text-slate-500 mt-6">Protocol error? <a href="#" onclick="resetPassword()" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">Reset Access Key</a></p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="hidden space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Official Name</label>
                    <div class="flex items-center border border-slate-700 rounded-xl px-4 bg-slate-900/50 focus-within:border-emerald-400 focus-within:ring-1 focus-within:ring-emerald-400/50 transition-all">
                        <i class="fas fa-user-shield text-slate-500"></i>
                        <input type="text" id="signup-name" required class="w-full p-4 outline-none text-sm font-medium bg-transparent text-white placeholder-slate-600" placeholder="Christian Solomon">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Institutional Email</label>
                    <div class="flex items-center border border-slate-700 rounded-xl px-4 bg-slate-900/50 focus-within:border-emerald-400 focus-within:ring-1 focus-within:ring-emerald-400/50 transition-all">
                        <i class="fas fa-envelope text-slate-500"></i>
                        <input type="email" id="signup-email" required class="w-full p-4 outline-none text-sm font-medium bg-transparent text-white placeholder-slate-600" placeholder="student@uniuyo.edu.ng">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Generate Access Key</label>
                    <div class="flex items-center border border-slate-700 rounded-xl px-4 bg-slate-900/50 focus-within:border-emerald-400 focus-within:ring-1 focus-within:ring-emerald-400/50 transition-all">
                        <i class="fas fa-key text-slate-500"></i>
                        <input type="password" id="signup-password" required class="w-full p-4 outline-none text-sm font-medium bg-transparent text-white placeholder-slate-600 tracking-widest" placeholder="•••••••• (Min 6)">
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full btn-glow-success text-white font-bold py-4 rounded-xl uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                        Initialize ID <i class="fas fa-satellite-dish"></i>
                    </button>
                </div>
            </form>

        </div>
        
        <div class="bg-slate-900/80 p-4 text-center border-t border-white/5 flex justify-between items-center px-8">
            <p class="text-[9px] text-slate-500 font-mono uppercase tracking-[0.2em]">AES-256 Encrypted</p>
            <p class="text-[9px] text-slate-500 font-mono uppercase tracking-[0.2em]">BMS Terminal</p>
        </div>
    </div>

    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendPasswordResetEmail, onAuthStateChanged } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCrF_INEtL9bZKAoDPYCuTaVMRWGAdbcew",
            authDomain: "splendids-academy-v2.firebaseapp.com",
            projectId: "splendids-academy-v2",
            storageBucket: "splendids-academy-v2.firebasestorage.app",
            messagingSenderId: "573697150601",
            appId: "1:573697150601:web:74c556c85b6be053018058",
            measurementId: "G-VVDT1PMHNX"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- DOM ELEMENTS ---
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const msgBox = document.getElementById('auth-message');
        const loader = document.getElementById('loading');

        // --- DYNAMIC INTELLIGENT COUNTDOWN ENGINE ---
        // The exact UNIUYO 200L Exam Timetable encoded in WAT (GMT+0100)
        const examSchedule = [
            { code: "PHS 211", date: new Date('March 3, 2026 11:00:00 GMT+0100').getTime() },
            { code: "MBC 211", date: new Date('March 4, 2026 11:00:00 GMT+0100').getTime() },
            { code: "ANA 211", date: new Date('March 5, 2026 08:00:00 GMT+0100').getTime() },
            { code: "PHS 212", date: new Date('March 9, 2026 08:00:00 GMT+0100').getTime() },
            { code: "PHS 213", date: new Date('March 12, 2026 08:00:00 GMT+0100').getTime() },
            { code: "PHS 214", date: new Date('March 13, 2026 08:00:00 GMT+0100').getTime() },
            { code: "ANA 213", date: new Date('March 20, 2026 08:00:00 GMT+0100').getTime() },
            { code: "GST 211", date: new Date('March 26, 2026 11:00:00 GMT+0100').getTime() }
        ];

        function updateDynamicCountdown() {
            const now = new Date().getTime();
            let nextExam = null;

            // Iterate through to find the active or next upcoming exam
            // An exam is considered "Active" until 2 hours after it starts
            for (let i = 0; i < examSchedule.length; i++) {
                if (examSchedule[i].date + (2 * 60 * 60 * 1000) > now) {
                    nextExam = examSchedule[i];
                    break;
                }
            }

            const banner = document.getElementById('countdown-banner');
            const nameEl = document.getElementById('next-exam-name');
            const timerEl = document.getElementById('index-countdown');

            // If all exams have passed
            if (!nextExam) {
                banner.classList.remove('hidden');
                nameEl.textContent = "ALL EXAMS CLEARED";
                timerEl.textContent = "CORE WEEK COMPLETE";
                timerEl.classList.add('text-emerald-400');
                return;
            }

            banner.classList.remove('hidden');
            nameEl.textContent = nextExam.code;

            const distance = nextExam.date - now;

            // If the exam is currently happening (within the 2-hour window)
            if (distance < 0) {
                timerEl.textContent = "EXAM IN PROGRESS";
                timerEl.classList.add('text-red-500', 'animate-pulse');
                timerEl.classList.remove('text-white');
                return;
            }

            // Normal Countdown Math
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Formatting
            let timeString = '';
            if (days > 0) timeString += `${days}d `;
            timeString += `${hours.toString().padStart(2, '0')}h ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;

            timerEl.textContent = timeString;
        }

        // Initialize and cycle the dynamic countdown every second
        setInterval(updateDynamicCountdown, 1000);
        updateDynamicCountdown();

        // --- AUTH STATE LISTENER (Redirect if logged in or handle lockout) ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "dashboard.html";
            } else {
                if (localStorage.getItem('session_timeout') === 'true') {
                    showMessage("Security Protocol: Session terminated due to 15 minutes of inactivity. Please re-authenticate.", "error");
                    localStorage.removeItem('session_timeout');
                }
            }
        });

        // --- LOGIN LOGIC ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            showLoading(true);

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    showMessage("Clearance Accepted. Connecting to Mainframe...", "success");
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                })
                .catch((error) => {
                    showLoading(false);
                    showMessage(cleanError(error.code), "error");
                });
        });

        // --- SIGNUP LOGIC ---
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;

            showLoading(true);

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    updateProfile(auth.currentUser, { displayName: name })
                    .then(() => {
                        showMessage("Identity Initialized. Welcome, " + name, "success");
                        setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                    });
                })
                .catch((error) => {
                    showLoading(false);
                    showMessage(cleanError(error.code), "error");
                });
        });

        // --- RESET PASSWORD ---
        window.resetPassword = function() {
            const email = prompt("Enter clearance email for key reset:");
            if(email) {
                sendPasswordResetEmail(auth, email)
                    .then(() => alert("Override link dispatched to communications array (Check your inbox)."))
                    .catch((error) => alert(cleanError(error.code)));
            }
        }

        // --- UI UTILITIES ---
        function showMessage(text, type) {
            msgBox.textContent = text;
            msgBox.className = 'mb-6 p-4 rounded-xl text-xs font-bold text-center border transition-all duration-300';
            
            if(type === 'error') {
                msgBox.classList.add('bg-rose-500/10', 'text-rose-400', 'border-rose-500/30');
            } else {
                msgBox.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/30');
            }
            msgBox.classList.remove('hidden');
        }

        function cleanError(code) {
            return code.replace('auth/', '').replace(/-/g, ' ').toUpperCase();
        }

        function showLoading(show) {
            if(show) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        // Expose toggle function to window
        window.toggleForm = function(tab) {
            const loginBtn = document.getElementById('tab-login');
            const signupBtn = document.getElementById('tab-signup');
            
            msgBox.classList.add('hidden'); // Clear errors

            const activeClasses = ['text-cyan-400', 'border-b-2', 'border-cyan-400', 'bg-slate-800/50'];
            const inactiveClasses = ['text-slate-500', 'border-transparent', 'hover:text-slate-300'];

            if(tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                
                loginBtn.classList.remove(...inactiveClasses);
                loginBtn.classList.add(...activeClasses);
                
                signupBtn.classList.remove(...activeClasses);
                signupBtn.classList.add(...inactiveClasses);
            } else {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                
                signupBtn.classList.remove(...inactiveClasses);
                signupBtn.classList.add(...activeClasses);
                
                loginBtn.classList.remove(...activeClasses);
                loginBtn.classList.add(...inactiveClasses);
            }
        }
    </script>
</body>
    </html>
