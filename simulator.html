    <script>
        // 1. THE MULTI-COURSE MASTER VAULT (With Explanations)
        const courseVault = {

            
            // 🔴 PHYSIOLOGY (PHS 211) 
            "PHS211": [
                {
                    question: "Which of the following physiological events represents a positive feedback mechanism under normal physiological conditions?",
                    options: [
                        "Regulation of the blood glucose level.",
                        "Generation of the action potential.",
                        "Maintenance of normal blood pressure.",
                        "Control of internal body temperature."
                    ],
                    correctAnswer: 1,
                    explanation: "Generation of an action potential relies on positive feedback: the opening of a few voltage-gated sodium channels causes depolarization, which triggers the opening of even more sodium channels in an explosive cascade."
                },
                {
                    question: "In the renal tubules, the transport of glucose across the apical membrane is primarily driven by which of the following mechanisms?",
                    options: [
                        "Primary active transport via ATP hydrolysis.",
                        "Simple diffusion through the lipid bilayer.",
                        "Sodium-linked secondary active symport.",
                        "Calcium-linked secondary active antiport."
                    ],
                    correctAnswer: 2,
                    explanation: "Glucose is transported into intestinal and renal cells via sodium-linked co-transport (symport). It uses the energy stored in the Na+ concentration gradient, originally established by the Na+/K+ ATPase, to move glucose against its own gradient."
                },
                {
                    question: "Using the Nernst equation, what specifically determines the magnitude of the equilibrium potential for a single permeant ion?",
                    options: [
                        "The ratio of intracellular to extracellular ion concentration.",
                        "The absolute number of protein channels open at any time.",
                        "The overall thickness of the lipid bilayer in the membrane.",
                        "The total electrical charge of all intracellular macromolecules."
                    ],
                    correctAnswer: 0,
                    explanation: "The Nernst equation converts a concentration difference for an ion into a voltage. The magnitude depends entirely on the ratio of the ion's concentration inside the cell relative to the outside (along with the ion's valence)."
                },
                {
                    question: "What physiological phenomenon occurs when an excitable cell is depolarized so slowly that it fails to fire an action potential?",
                    options: [
                        "Voltage inactivation of the sodium channels.",
                        "Rapid spontaneous opening of calcium channels.",
                        "Complete blockage of the sodium-potassium pump.",
                        "Irreversible saturation of the potassium channels."
                    ],
                    correctAnswer: 0,
                    explanation: "This is the principle of Accommodation. During slow depolarization, the activation gates of Na+ channels open, but the inactivation gates close before the threshold is reached, preventing the explosive influx needed for an action potential."
                },
                {
                    question: "The electrogenic nature of the Na+/K+ ATPase pump directly contributes to the resting membrane potential by executing which specific ion transfer?",
                    options: [
                        "Pumping three sodium ions out and two potassium ions in.",
                        "Pumping two sodium ions out and three potassium ions in.",
                        "Pumping three sodium ions in and two potassium ions out.",
                        "Pumping two sodium ions in and three potassium ions out."
                    ],
                    correctAnswer: 0,
                    explanation: "The pump extrudes 3 Na+ ions for every 2 K+ ions brought into the cell. This unequal transfer of positive charges results in a net loss of positive charge from the cell interior, contributing to the negative resting membrane potential."
                },
                {
                    question: "During the contraction of a skeletal muscle fiber, which structural change occurs within the basic contractile unit (the sarcomere)?",
                    options: [
                        "The A band becomes significantly shorter.",
                        "The I band becomes significantly shorter.",
                        "The Z lines move further apart from each other.",
                        "The thick myosin filaments physically shorten."
                    ],
                    correctAnswer: 1,
                    explanation: "According to the sliding filament theory, actin filaments slide over myosin filaments. The A band (representing the length of the myosin) remains unchanged, while the I band (actin only) shortens as the Z lines are pulled closer together."
                },
                {
                    question: "Which specific structural protein anchors the thick myosin filaments to the Z lines within a skeletal muscle sarcomere?",
                    options: [
                        "Actin filaments.",
                        "Myosin molecules.",
                        "Titin filaments.",
                        "Spectrin networks."
                    ],
                    correctAnswer: 2,
                    explanation: "Titin is a giant, highly elastic protein filament that anchors the thick myosin filaments to the Z lines, maintaining their central position within the sarcomere and providing passive elasticity to the muscle."
                },
                {
                    question: "Receptor-mediated endocytosis of specific extracellular macromolecules requires the invagination of membrane pits coated with which specific protein?",
                    options: [
                        "Structural tubulin.",
                        "Membrane clathrin.",
                        "Cytosolic actin.",
                        "Intracellular myosin."
                    ],
                    correctAnswer: 1,
                    explanation: "Ligands bind to specific membrane receptors, which then migrate laterally to cluster in pits coated with the protein clathrin. These coated pits invaginate and pinch off to form intracellular coated vesicles."
                },
                {
                    question: "Which primary cellular event characterizes the proliferation phase of the normal physiological wound healing cascade?",
                    options: [
                        "Neutrophil migration to destroy pathogens.",
                        "Fibroblast collagen production and angiogenesis.",
                        "Platelet aggregation to form a fibrin clot.",
                        "Replacement of type III collagen with type I."
                    ],
                    correctAnswer: 1,
                    explanation: "The proliferation phase occurs days to weeks after injury and is characterized by fibroblasts producing collagen, new blood vessel formation (angiogenesis), and keratinocyte migration to close the surface."
                },
                {
                    question: "Which plasma protein is principally responsible for maintaining the colloidal osmotic (oncotic) pressure of the intravascular fluid?",
                    options: [
                        "Alpha-1-antitrypsin.",
                        "Gamma globulin.",
                        "Serum albumin.",
                        "Plasma fibrinogen."
                    ],
                    correctAnswer: 2,
                    explanation: "Albumin is the most abundant plasma protein and accounts for 75-80% of the blood's colloidal osmotic pressure, which draws water into the blood vessels and prevents tissue edema."
                },
                {
                    question: "At which specific stage of normal erythropoiesis does the developing red blood cell physically extrude its nucleus?",
                    options: [
                        "Proerythroblast stage.",
                        "Early erythroblast stage.",
                        "Orthochromatic normoblast stage.",
                        "Mature erythrocyte stage."
                    ],
                    correctAnswer: 2,
                    explanation: "The nucleus is ejected from the cell during the late erythroblast (normoblast) stage once sufficient hemoglobin has been synthesized. The resulting anucleate cell is a reticulocyte, which matures into an erythrocyte."
                },
                {
                    question: "What is the specific polypeptide chain composition of normal adult Hemoglobin A2?",
                    options: [
                        "Two alpha chains and two beta chains.",
                        "Two alpha chains and two delta chains.",
                        "Two alpha chains and two gamma chains.",
                        "Two zeta chains and two epsilon chains."
                    ],
                    correctAnswer: 1,
                    explanation: "Normal adult hemoglobin (HbA) is composed of two alpha and two beta chains. Hemoglobin A2, which makes up about 2.5% of adult hemoglobin, consists of two alpha chains and two delta chains."
                },
                {
                    question: "In human blood plasma, absorbed ferrous iron is converted to the ferric form and transported by which specific protein?",
                    options: [
                        "Hemosiderin.",
                        "Transferrin.",
                        "Apoferritin.",
                        "Ceruloplasmin."
                    ],
                    correctAnswer: 1,
                    explanation: "Iron is transported in the blood plasma by transferrin in the ferric state. Ferritin and hemosiderin are intracellular storage forms of iron, not transport proteins."
                },
                {
                    question: "Which physiological alteration in the blood primarily accelerates the Erythrocyte Sedimentation Rate (ESR) during acute inflammation?",
                    options: [
                        "Decreased synthesis of circulating albumin.",
                        "Increased formation of rouleaux by fibrinogen.",
                        "Elevated production of red blood cells.",
                        "Rapid degradation of plasma immunoglobulins."
                    ],
                    correctAnswer: 1,
                    explanation: "During inflammation, increased levels of acute-phase proteins, particularly fibrinogen, reduce the negative repulsive charges on RBCs. This causes them to stack together (rouleaux formation), making them heavier and settle faster."
                },
                {
                    question: "Upon activation by IgE-bound parasites, eosinophils degranulate and release which specific cytotoxic protein to destroy the invading helminth?",
                    options: [
                        "Major basic protein.",
                        "Tissue plasminogen activator.",
                        "Alpha-1-antitrypsin.",
                        "Vascular endothelial growth factor."
                    ],
                    correctAnswer: 0,
                    explanation: "Eosinophils recognize parasites coated with IgE antibodies. Upon binding, they release highly toxic granular contents, predominantly Major Basic Protein (MBP) and cationic peptides, which destroy the parasite."
                },
                {
                    question: "During acute allergic hypersensitivity reactions, basophils rapidly degranulate to release which potent vasodilatory chemical mediator?",
                    options: [
                        "Major basic protein.",
                        "Secretory histamine.",
                        "Gamma interferon.",
                        "Alkaline phosphatase."
                    ],
                    correctAnswer: 1,
                    explanation: "Basophils (and tissue mast cells) contain granules filled with histamine and heparin. Upon activation by an allergen, they release histamine, causing the vasodilation and increased capillary permeability characteristic of allergic reactions."
                },
                {
                    question: "Monocytes that migrate from the peripheral circulation into the hepatic sinusoids differentiate into which specialized tissue macrophages?",
                    options: [
                        "Alveolar dust cells.",
                        "Splenic histiocytes.",
                        "Renal mesangial cells.",
                        "Hepatic Kupffer cells."
                    ],
                    correctAnswer: 3,
                    explanation: "The Mononuclear Phagocyte System involves circulating monocytes differentiating into tissue-specific macrophages. In the liver, they become Kupffer cells, which line the sinusoids to filter portal blood."
                },
                {
                    question: "Healthy, intact vascular endothelium actively secretes which combination of molecules to prevent spontaneous platelet aggregation?",
                    options: [
                        "Thromboxane A2 and serotonin.",
                        "Nitric oxide and prostacyclin.",
                        "Adenosine diphosphate and calcium.",
                        "Fibrinogen and von Willebrand factor."
                    ],
                    correctAnswer: 1,
                    explanation: "Intact endothelial cells maintain blood fluidity by secreting antiplatelet agents like Nitric Oxide (NO) and Prostacyclin (PGI2), which act as powerful vasodilators and inhibit platelet GPIB receptor binding."
                },
                {
                    question: "During the primary phase of hemostasis, platelets adhere securely to the exposed subendothelial collagen via which specific mechanism?",
                    options: [
                        "Binding of GPIB receptors to von Willebrand factor.",
                        "Secretion of tissue plasminogen activator by endothelium.",
                        "Activation of factor XII by the phospholipid membrane.",
                        "Release of prostacyclin from damaged smooth muscle."
                    ],
                    correctAnswer: 0,
                    explanation: "Damaged endothelium releases von Willebrand Factor (vWF), which anchors to the exposed collagen. Platelets then use their surface Glycoprotein Ib (GPIB) receptors to bind to the vWF, a process called platelet adhesion."
                },
                {
                    question: "The extrinsic pathway of the blood coagulation cascade is specifically initiated by the release of which chemical factor?",
                    options: [
                        "Hageman factor (Factor XII).",
                        "Tissue factor (Factor III).",
                        "Stuart-Prower factor (Factor X).",
                        "Antihemophilic factor (Factor VIII)."
                    ],
                    correctAnswer: 1,
                    explanation: "The extrinsic pathway is triggered very rapidly (15 seconds) following vascular trauma when damaged tissue releases Tissue Factor (Factor III), which then directly activates Factor VII."
                },
                {
                    question: "Which specific enzyme is responsible for the proteolytic degradation of polymerized fibrin strands during the process of clot dissolution?",
                    options: [
                        "Activated thrombin.",
                        "Circulating plasmin.",
                        "Tissue thromboplastin.",
                        "Antithrombin III."
                    ],
                    correctAnswer: 1,
                    explanation: "Fibrinolysis is the breakdown of a clot. Healthy endothelial cells release Tissue Plasminogen Activator (TPA), which converts inactive plasminogen into active plasmin. Plasmin then cuts the fibrin threads into degradation products."
                },
                {
                    question: "Blood lost continuously during major vascular surgery is collected, washed, and immediately reinfused into the patient. What is this procedure called?",
                    options: [
                        "Pre-operative autologous donation.",
                        "Acute normovolemic hemodilution.",
                        "Intraoperative cell salvage.",
                        "Post-operative blood salvage."
                    ],
                    correctAnswer: 2,
                    explanation: "Intraoperative cell salvage is a type of autologous transfusion where the patient's own shed blood is recovered during the operation, processed to remove plasma and debris, and reinfused."
                },
                {
                    question: "Fresh Frozen Plasma (FFP) is primarily indicated for administration in patients experiencing which of the following clinical conditions?",
                    options: [
                        "Severe symptomatic anemia with tissue hypoxia.",
                        "Spontaneous hemorrhage due to thrombocytopenia.",
                        "Multiple coagulation factor deficiencies and bleeding.",
                        "Chronic iron overload following repeated transfusions."
                    ],
                    correctAnswer: 2,
                    explanation: "FFP contains all the plasma coagulation factors. It is indicated for patients bleeding due to multiple factor deficiencies (e.g., massive transfusion, liver disease, or warfarin reversal). It does not contain platelets or RBCs."
                },
                {
                    question: "A patient develops severe acute hypoxemia and bilateral pulmonary edema without fluid overload within 6 hours of a transfusion. What is the diagnosis?",
                    options: [
                        "Transfusion-Associated Circulatory Overload.",
                        "Transfusion-Related Acute Lung Injury.",
                        "Acute Hemolytic Transfusion Reaction.",
                        "Transfusion-Associated Graft-vs-Host Disease."
                    ],
                    correctAnswer: 1,
                    explanation: "TRALI (Transfusion-Related Acute Lung Injury) presents as acute hypoxemia and non-cardiogenic pulmonary edema within 6 hours. TACO presents similarly but involves hypertension and fluid overload."
                },
                {
                    question: "To preserve functionality and prevent irreversible cold-induced activation, platelet concentrates must be stored at which temperature range?",
                    options: [
                        "1°C to 6°C with constant agitation.",
                        "20°C to 24°C with constant agitation.",
                        "-18°C to -20°C without any agitation.",
                        "35°C to 37°C without any agitation."
                    ],
                    correctAnswer: 1,
                    explanation: "Unlike RBCs, platelets must be stored at room temperature (20-24°C) with constant, gentle agitation. Cold temperatures irreversibly activate platelets, causing them to clump and be rapidly cleared upon transfusion."
                },
                {
                    question: "RhoGAM is administered to prevent hemolytic disease of the newborn. What is the specific physiological mechanism of action of this medication?",
                    options: [
                        "It destroys maternal anti-D antibodies in the plasma.",
                        "It clears fetal Rh-positive cells before maternal sensitization.",
                        "It prevents the transfer of maternal IgG across the placenta.",
                        "It suppresses the fetal immune system from reacting to the mother."
                    ],
                    correctAnswer: 1,
                    explanation: "RhoGAM provides passive immunization by supplying ready-made anti-D antibodies. These antibodies hunt down and destroy any leaked fetal Rh-positive RBCs in the maternal circulation before the mother's immune system can recognize them and mount a permanent response."
                },
                {
                    question: "Which diagnostic test is utilized specifically to determine if an individual's serum contains unbound antibodies that could attack transfused red cells?",
                    options: [
                        "The Direct Coombs test.",
                        "The Indirect Coombs test.",
                        "The Westergren ESR test.",
                        "The Wintrobe hematocrit test."
                    ],
                    correctAnswer: 1,
                    explanation: "The Indirect Coombs test detects circulating, unbound antibodies in the serum (used to prevent HDN or transfusion reactions). The Direct Coombs test checks if antibodies are already bound directly to the patient's RBCs."
                },
                {
                    question: "According to Starling forces, what percentage of fluid filtered at the arterial end of a capillary is typically reabsorbed at the venous end?",
                    options: [
                        "Ten percent of the filtered fluid volume.",
                        "Fifty percent of the filtered fluid volume.",
                        "Ninerty percent of the filtered fluid volume.",
                        "One hundred percent of the filtered fluid volume."
                    ],
                    correctAnswer: 2,
                    explanation: "High hydrostatic pressure forces fluid out at the arterial end. At the venous end, lower hydrostatic pressure and high oncotic pressure pull 90% of the fluid back in. The remaining 10% is drained by the lymphatic system."
                },
                {
                    question: "In response to systemic cellular hypoxia, the vast majority of erythropoietin is synthesized and secreted by which specific anatomical structures?",
                    options: [
                        "Hepatic Kupffer cells.",
                        "Splenic reticuloendothelial cells.",
                        "Renal peritubular interstitial cells.",
                        "Bone marrow hemocytoblasts."

        let selectedQuestions = [];

        // 2. THE ENGINE IGNITION
        function igniteEngine(courseCode) {
            if (!courseVault[courseCode] || courseVault[courseCode].length === 0) {
                alert("System Notice: The Director is currently uploading materials for " + courseCode + ".");
                return;
            }

            document.getElementById('vault-intro').classList.add('hidden');
            document.getElementById('exam-stats').classList.remove('hidden');
            document.getElementById('exam-container').classList.remove('hidden');
            document.getElementById('submit-container').classList.remove('hidden');
            document.getElementById('exam-timer').classList.remove('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            
            document.getElementById('course-title-display').innerText = courseCode + " SIMULATION";

            let targetDatabase = courseVault[courseCode];
            let shuffled = [...targetDatabase];
            
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            selectedQuestions = shuffled.slice(0, Math.min(50, shuffled.length));
            userAnswers = new Array(selectedQuestions.length).fill(null);
            
            updateProgressUI();
            startTimer(15 * 60); // SET TO 15 MINUTES
            renderExam();
        }

        // 3. THE 15-MINUTE TIMER
        function startTimer(durationInSeconds) {
            let timer = durationInSeconds;
            const display = document.getElementById('time-display');
            
            timerInterval = setInterval(function () {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (timer < 300) {
                    display.classList.remove('text-white');
                    display.classList.add('text-red-500', 'animate-pulse');
                }

                if (--timer < 0) {
                    clearInterval(timerInterval);
                    calculateScore(); 
                }
            }, 1000);
        }

        // 4. THE RENDER ENGINE
        function renderExam() {
            const container = document.getElementById('exam-container');
            container.innerHTML = ''; 

            selectedQuestions.forEach((q, qIndex) => {
                let optionsHTML = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHTML += `
                        <label class="block relative mb-3 cursor-pointer option-label group">
                            <input type="radio" name="q${qIndex}" value="${optIndex}" onchange="recordAnswer(${qIndex}, ${optIndex})">

                                <div class="radio-indicator w-5 h-5 rounded-full border-2 border-slate-500 mr-4 flex-shrink-0 transition-colors"></div>
                                <span class="text-sm md:text-base text-slate-300 font-medium">${opt}</span>
                            </div>
                        </label>
                    `;
                });

                const questionHTML = `
                    <div class="reveal-on-scroll bg-slate-800/80 backdrop-blur-sm p-6 rounded-2xl border border-slate-700 shadow-lg" style="animation-delay: ${Math.min(qIndex * 0.05, 1)}s">
                        <div class="flex items-start gap-4 mb-5 border-b border-slate-700/50 pb-4">
                            <div class="bg-gradient-to-br from-cyan-600 to-blue-600 text-white font-black h-8 w-8 rounded-lg flex items-center justify-center flex-shrink-0 shadow-inner">
                                ${qIndex + 1}
                            </div>
                            <h3 class="text-slate-100 font-bold leading-relaxed text-lg tracking-tight">${q.question}</h3>
                        </div>
                        <div class="pl-0 md:pl-12">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
                container.innerHTML += questionHTML;
            });
        }

        function recordAnswer(qIndex, optIndex) {
            if (userAnswers[qIndex] === null) {
                questionsAttemptedCount++;
                updateProgressUI();
            }
            userAnswers[qIndex] = optIndex;
        }

        function updateProgressUI() {
            const total = selectedQuestions.length;
            document.getElementById('questions-attempted').innerText = `${questionsAttemptedCount} / ${total} Answered`;
            const percentage = (questionsAttemptedCount / total) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        // 5. THE GRADING ENGINE
        function calculateScore() {
            clearInterval(timerInterval);

            let score = 0;
            selectedQuestions.forEach((q, index) => {
                if (userAnswers[index] === q.correctAnswer) {
                    score++;
                }
            });

            document.getElementById('exam-stats').classList.add('hidden');
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('submit-container').classList.add('hidden');
            document.getElementById('exam-timer').classList.add('hidden');
            document.getElementById('progress-container').classList.add('hidden');
            
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.classList.remove('hidden');
            
            const scoreElement = document.getElementById('final-score');
            let currentScore = 0;
            const scoreInterval = setInterval(() => {
                if (currentScore >= score) {
                    clearInterval(scoreInterval);
                    scoreElement.innerText = `${score} / ${selectedQuestions.length}`;
                    
                    const percentage = (score / selectedQuestions.length) * 100;
                    if (percentage >= 70) scoreElement.classList.add('text-emerald-400');
                    else if (percentage >= 50) scoreElement.classList.add('text-yellow-400');
                    else scoreElement.classList.add('text-red-400');
                } else {
                    currentScore++;
                    scoreElement.innerText = `${currentScore} / ${selectedQuestions.length}`;
                }
            }, 30);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

                        </div>

                            ${optionsHTML}

                        </div>
                    </div>
                `;
                container.innerHTML += questionHTML;
            });
            
            // Bottom Action Buttons for Review Mode
            container.innerHTML += `
                <div class="text-center mt-8 pb-10 flex flex-col md:flex-row justify-center gap-4">
                    <button onclick="backToScore()" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl transition-colors active:scale-95 shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left"></i> BACK TO SCORE
                    </button>
                    <button onclick="location.reload()" class="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl transition-colors active:scale-95 shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-redo"></i> RE-ROLL VAULT
                    </button>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToScore() {
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('score-display').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
