<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Exam Vault | Splendid's Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans selection:bg-cyan-500 selection:text-white pb-20">

    <header class="bg-slate-900/80 backdrop-blur-md border-b border-cyan-500/30 sticky top-0 z-50 px-4 py-4 shadow-[0_4px_30px_rgba(6,182,212,0.15)]">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tighter">
                    THE EXAM VAULT
                </h1>
                <p class="text-xs text-cyan-200 font-bold tracking-widest uppercase">Live Mock Simulator</p>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        
        <div id="vault-intro" class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-black text-white mb-2 tracking-tighter">Select Target Module</h2>
        <p class="text-slate-400 text-sm">Choose your course. The engine will extract 50 random questions from the lecturer's core material.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <button onclick="igniteEngine('PHS211')" class="group relative overflow-hidden bg-slate-900 border border-red-500/30 hover:border-red-500 rounded-xl p-4 transition-all hover:shadow-[0_0_20px_rgba(239,68,68,0.2)]">
            <div class="text-red-500 text-3xl mb-2"><i class="fas fa-heartbeat"></i></div>
            <h3 class="text-white font-bold text-lg">PHS 211</h3>
            <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest group-hover:text-red-400">Launch Physiology</p>
        </button>

        <button onclick="igniteEngine('MBC211')" class="group relative overflow-hidden bg-slate-900 border border-blue-500/30 hover:border-blue-500 rounded-xl p-4 transition-all hover:shadow-[0_0_20px_rgba(59,130,246,0.2)]">
            <div class="text-blue-500 text-3xl mb-2"><i class="fas fa-dna"></i></div>
            <h3 class="text-white font-bold text-lg">MBC 211</h3>
            <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest group-hover:text-blue-400">Launch Biochemistry</p>
        </button>

        <button onclick="igniteEngine('ANA211')" class="group relative overflow-hidden bg-slate-900 border border-green-500/30 hover:border-green-500 rounded-xl p-4 transition-all hover:shadow-[0_0_20px_rgba(34,197,94,0.2)]">
            <div class="text-green-500 text-3xl mb-2"><i class="fas fa-bone"></i></div>
            <h3 class="text-white font-bold text-lg">Anatomy</h3>
            <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest group-hover:text-green-400">Launch Gross Anatomy</p>
        </button>
    </div>
</div>

        <div id="exam-container" class="hidden space-y-6">
            </div>

        <div id="submit-container" class="hidden mt-8 text-center">
            <button onclick="calculateScore()" class="w-full md:w-auto px-10 py-4 bg-green-600 hover:bg-green-500 text-white font-black rounded-xl transition-all shadow-[0_0_20px_rgba(34,197,94,0.4)] tracking-widest">
                SUBMIT & ANALYZE <i class="fas fa-chart-line ml-2"></i>
            </button>
        </div>

        <div id="score-display" class="hidden bg-slate-800 border border-cyan-500 rounded-2xl p-8 text-center mt-6 shadow-2xl">
            <h3 class="text-lg text-slate-300 font-bold uppercase tracking-widest mb-2">Final Diagnostic</h3>
            <div id="final-score" class="text-6xl font-black text-white mb-4">--/50</div>
            <button onclick="location.reload()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg transition-colors">
                RE-ROLL QUESTIONS <i class="fas fa-redo ml-2"></i>
            </button>
        </div>

    </main>

    <script>
        // 1. THE MULTI-COURSE MASTER VAULT
const courseVault = {
    
    // 🔴 PHYSIOLOGY (PHS 211)
    "PHS211": [
        {
            question: "During the cardiac cycle, which specific event corresponds to the closure of the atrioventricular (mitral and tricuspid) valves?",
            options: [
                "Isovolumetric ventricular relaxation",
                "Rapid ventricular ejection",
                "Isovolumetric ventricular contraction",
                "Atrial systole"
            ],
            correctAnswer: 2
        },
        // Add 99 more PHS questions here...
    ],

    // 🔵 BIOCHEMISTRY (MBC 211)
    "MBC211": [
        {
            question: "According to the Michaelis-Menten equation $V_0 = \\frac{V_{max}[S]}{K_m + [S]}$, what does it mean when the substrate concentration $[S]$ is exactly equal to $K_m$?",
            options: [
                "The enzyme is fully saturated.",
                "The initial velocity is half of the maximal velocity ($V_{max}/2$).",
                "The reaction has reached equilibrium.",
                "The enzyme is denatured."
            ],
            correctAnswer: 1
        },
        // Add 99 more MBC questions here...
    ],

    // 🟢 ANATOMY (ANA 211)
    "ANA211": [
        {
            question: "A patient presents with 'wrist drop' following a mid-shaft fracture of the humerus. Which nerve has been compromised in the radial groove?",
            options: [
                "Median Nerve",
                "Ulnar Nerve",
                "Axillary Nerve",
                "Radial Nerve"
            ],
            correctAnswer: 3
        }
        // Add 99 more Anatomy questions here...
    ],

    // ⚡ PHYSIOLOGY (PHS 212)
    "PHS212": [
        {
            
};

        let selectedQuestions = [];
        let userAnswers = [];

        // 2. THE TARGETED RANDOMIZATION ENGINE
function igniteEngine(courseCode) {
    // 1. Check if the course has questions
    if (!courseVault[courseCode] || courseVault[courseCode].length === 0) {
        alert("System Notice: Questions for " + courseCode + " are currently being uploaded by the Director of Academics. Check back shortly.");
        return;
    }

    // 2. Hide intro, show exam area
    document.getElementById('vault-intro').classList.add('hidden');
    document.getElementById('exam-container').classList.remove('hidden');
    document.getElementById('submit-container').classList.remove('hidden');

    // 3. Grab the specific course array and shuffle it
    let targetDatabase = courseVault[courseCode];
    let shuffled = [...targetDatabase];
    
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    // 4. Slice up to 50 questions
    selectedQuestions = shuffled.slice(0, 50);
    userAnswers = new Array(selectedQuestions.length).fill(null);

    // 5. Render
    renderExam();
}

        // 3. THE RENDER ENGINE
        function renderExam() {
            const container = document.getElementById('exam-container');
            container.innerHTML = ''; // Clear previous

            selectedQuestions.forEach((q, qIndex) => {
                let optionsHTML = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHTML += `
                        <label class="block p-3 border border-slate-700 rounded-lg hover:bg-slate-700/50 cursor-pointer transition-colors mb-2">
                            <input type="radio" name="q${qIndex}" value="${optIndex}" onchange="recordAnswer(${qIndex}, ${optIndex})" class="mr-3 accent-cyan-500">
                            <span class="text-sm text-slate-300">${opt}</span>
                        </label>
                    `;
                });

                const questionHTML = `
                    <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                        <div class="flex items-start gap-3 mb-4">
                            <span class="bg-cyan-900 text-cyan-400 font-black px-3 py-1 rounded-md text-sm">${qIndex + 1}</span>
                            <h3 class="text-slate-100 font-bold leading-relaxed">${q.question}</h3>
                        </div>
                        <div class="pl-12">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
                container.innerHTML += questionHTML;
            });
        }

        // 4. THE GRADING ENGINE
        function recordAnswer(qIndex, optIndex) {
            userAnswers[qIndex] = optIndex;
        }

        function calculateScore() {
            let score = 0;
            selectedQuestions.forEach((q, index) => {
                if (userAnswers[index] === q.correctAnswer) {
                    score++;
                }
            });

            // Hide exam, show score
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('submit-container').classList.add('hidden');
            
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${selectedQuestions.length}`;
            
            // Scroll to top to see score
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
