                {

                        "Matthias Schleiden",

                },
                {

                        "Lysosomes",
                        "Golgi apparatus",
                        "Glyoxysomes",
                        "Mitochondria"
                    ],
                    correctAnswer: 2,
                    explanation: "Glyoxysomes are specialized peroxisomes in plants that convert lipids into carbohydrates to provide energy for the developing embryo."
                },
                {
                    question: "Within the cellular cytoskeleton, which motor protein is responsible for moving cargo toward the minus end of a microtubule?",
                    options: [
                        "Kinesin",
                        "Dynein",
                        "Myosin",
                        "Actin"
                    ],
                    correctAnswer: 1,
                    explanation: "Dyneins move toward the minus end of microtubules (retrograde transport), while kinesins move toward the plus end (anterograde transport)."
                },
                {
                    question: "When observing cellular motility, how does the movement of flagella differ from that of cilia?",
                    options: [
                        "Flagella use an oar-like motion perpendicular to the axis",
                        "Flagella use an undulating motion parallel to the axis",
                        "Flagella are driven by actin polymerization",
                        "Flagella rotate completely like a bacterial motor"
                    ],
                    correctAnswer: 1,
                    explanation: "Flagella move in an undulating, wave-like motion that generates force in the same direction as the cell's axis, whereas cilia use an oar-like motion perpendicular to the axis."
                },
                {
                    question: "During the first two months of human intrauterine life, erythropoiesis primarily occurs in which anatomical structure?",
                    options: [
                        "Embryonic liver",
                        "Red bone marrow",
                        "Developing spleen",
                        "Primitive yolk sac"
                    ],
                    correctAnswer: 3,
                    explanation: "This is the Mesoblastic stage. For the first two months of fetal development, red blood cells are produced by the mesenchyme of the yolk sac."
                },
                {
                    question: "After the age of 20 years, functional red bone marrow is restricted and RBCs are produced exclusively in which bones?",
                    options: [
                        "The entire shafts of all long bones",
                        "The distal ends of the radius and ulna",
                        "Membranous bones and proximal ends of long bones",
                        "The central diaphysis of the femur and humerus"
                    ],
                    correctAnswer: 2,
                    explanation: "After age 20, the shafts of long bones fill with yellow marrow (fat). Erythropoiesis is then restricted to membranous flat bones (sternum, ribs, vertebrae, pelvis) and the proximal epiphyses of the humerus and femur."
                },
                {
                    question: "Megaloblastic anemia is characterized by abnormally large proerythroblasts and is directly caused by a deficiency in which substance?",
                    options: [
                        "Elemental iron",
                        "Folic acid",
                        "Ascorbic acid",
                        "Erythropoietin"
                    ],
                    correctAnswer: 1,
                    explanation: "Folic acid and Vitamin B12 are essential for DNA synthesis. A deficiency prevents proper cell division, causing the RBC precursors to grow abnormally large without dividing."
                },
                {
                    question: "Pernicious anemia develops specifically due to the absence of Intrinsic Factor, which normally facilitates the absorption of:",
                    options: [
                        "Folic acid",
                        "Dietary iron",
                        "Vitamin B12",
                        "Vitamin C"
                    ],
                    correctAnswer: 2,
                    explanation: "Intrinsic factor is secreted by the parietal cells of the stomach and is absolutely required for the absorption of Vitamin B12 in the terminal ileum."
                },
                {
                    question: "Which specific trace metal is essential as a catalyst for the utilization of iron during the formation of hemoglobin?",
                    options: [
                        "Calcium",
                        "Sodium",
                        "Cobalt",
                        "Magnesium"
                    ],
                    correctAnswer: 2,
                    explanation: "While copper is needed for iron absorption, the trace metals cobalt and nickel are essential biological catalysts for the actual utilization of iron during hemoglobin synthesis."
                },
                {
                    question: "The biconcave disc shape of the mature erythrocyte provides several physiological advantages, primarily including:",
                    options: [
                        "Maximizing the synthesis of intracellular ATP",
                        "Preventing the attachment of circulating autoantibodies",
                        "Enhancing diffusion of gases by providing a greater surface area",
                        "Preventing the cell from swelling in hypotonic environments"
                    ],
                    correctAnswer: 2,
                    explanation: "The biconcave shape dramatically increases the surface area-to-volume ratio, ensuring highly efficient and rapid diffusion of oxygen and carbon dioxide across the cell membrane."
                },
                {
                    question: "A single mature hemoglobin molecule contains exactly four iron atoms. Therefore, what is its maximum oxygen-carrying capacity?",
                    options: [
                        "Two oxygen molecules",
                        "Four oxygen molecules",
                        "Eight oxygen molecules",
                        "Sixteen oxygen molecules"
                    ],
                    correctAnswer: 1,
                    explanation: "Each of the four heme groups contains one iron atom capable of reversibly binding exactly one molecule of oxygen. Thus, one hemoglobin molecule can carry four oxygen molecules."
                },
                {
                    question: "Under normal physiological conditions, what percentage of blood is composed of the fluid plasma?",
                    options: [
                        "45 percent",
                        "55 percent",
                        "75 percent",
                        "90 percent"
                    ],
                    correctAnswer: 1,
                    explanation: "Whole blood consists of approximately 55% fluid plasma and 45% formed cellular elements (erythrocytes, leukocytes, and thrombocytes)."
                },
                {
                    question: "The normal physiological range for the total white blood cell count in a healthy adult is:",
                    options: [
                        "1,000 to 3,000 cells per microliter",
                        "4,000 to 11,000 cells per microliter",
                        "12,000 to 20,000 cells per microliter",
                        "150,000 to 400,000 cells per microliter"
                    ],
                    correctAnswer: 1,
                    explanation: "The normal WBC count is 4,000 to 11,000 cells per cubic millimeter. A count below 4,000 is leukopenia, and a count above 11,000 is leukocytosis."
                },
                {
                    question: "A patient with a severe bacterial infection is treated with systemic corticosteroids. What effect will this have on their white blood cell count?",
                    options: [
                        "It will cause a severe and sudden leukopenia",
                        "It will have no effect on the white blood cell count",
                        "It will cause an artificial rise in the white blood cell count",
                        "It will permanently destroy all circulating lymphocytes"
                    ],
                    correctAnswer: 2,
                    explanation: "Corticosteroids cause demargination of neutrophils, artificially raising the WBC count. This is dangerous because it can mask the physiological signs of a spreading infection."
                },
                {
                    question: "A hospitalized patient suffering from severe leukopenia must strictly avoid which of the following procedures?",
                    options: [
                        "Non-invasive blood pressure monitoring",
                        "Oral administration of antibiotics",
                        "Rectal temperature measurements",
                        "Auscultation of the heart and lungs"
                    ],
                    correctAnswer: 2,
                    explanation: "Leukopenic patients lack the WBCs to fight infections. Any procedure that breaks skin or mucosal integrity—like intramuscular injections, enemas, or rectal thermometry—is strictly contraindicated."
                },
                {
                    question: "Which leukocyte is characterized by a bilobed nucleus and cytoplasmic granules that stain pink or red with an acidic dye?",
                    options: [
                        "Neutrophil",
                        "Basophil",
                        "Eosinophil",
                        "Monocyte"
                    ],
                    correctAnswer: 2,
                    explanation: "Eosinophils have a nucleus that resembles a telephone receiver and basic granules that readily take up the acidic pink/red dye known as eosin."
                },
                {
                    question: "During a parasitic infection, eosinophils bind to the parasite and release which toxic protein to destroy it?",
                    options: [
                        "Major basic protein",
                        "Tissue plasminogen activator",
                        "Secretory histamine",
                        "Tumor necrosis factor"
                    ],
                    correctAnswer: 0,
                    explanation: "Upon recognizing an IgE-coated parasite, eosinophils degranulate and release Major Basic Protein and cationic peptides, which directly destroy the helminth."
                },
                {
                    question: "Which of the following describes the correct distribution of fixed tissue macrophages within the Reticuloendothelial System?",
                    options: [
                        "Alveolar cells in the liver and Kupffer cells in the lungs",
                        "Histiocytes in the skin and Kupffer cells in the liver",
                        "Microglia in the spleen and Histiocytes in the brain",
                        "Kupffer cells in the lymph nodes and Dust cells in the bone marrow"
                    ],
                    correctAnswer: 1,
                    explanation: "Monocytes mature into tissue-specific macrophages. In the skin they are histiocytes, in the liver they are Kupffer cells, in the lungs they are alveolar dust cells, and in the brain they are microglia."
                },
                {
                    question: "In standard clinical biochemistry, the normal physiological Albumin to Globulin ratio is generally maintained between:",
                    options: [
                        "0.5 and 0.9",
                        "1.2 and 1.6",
                        "2.5 and 3.5",
                        "4.0 and 5.5"
                    ],
                    correctAnswer: 1,
                    explanation: "The normal A/G ratio is 1.2 to 1.6. A low A/G ratio indicates severe pathology, such as impaired albumin synthesis in liver cirrhosis or massive albumin loss in nephrotic syndrome."
                },
                {
                    question: "Which highly specific plasma protein is exclusively responsible for the transport of Vitamin A in the systemic circulation?",
                    options: [
                        "Transcobalamin",
                        "Ceruloplasmin",
                        "Transferrin",
                        "Retinol binding globulin"
                    ],
                    correctAnswer: 3,
                    explanation: "Retinol is the physiological form of Vitamin A. Because it is highly lipid-soluble, it cannot travel freely in plasma and requires Retinol binding globulin for safe vascular transport."
                },
                {
                    question: "Following their 8 to 12 day lifespan, more than half of the senescent platelets in the human body are destroyed by macrophages located in the:",
                    options: [
                        "Kidney",
                        "Spleen",
                        "Lungs",
                        "Bone marrow"
                    ],
                    correctAnswer: 1,
                    explanation: "Platelets are anucleate cell fragments with a short lifespan. Once they become old or non-functional, they are primarily filtered and phagocytized by the extensive macrophage network in the spleen."
                },
                {
                    question: "The production of platelets from megakaryocytes in the bone marrow is primarily driven by Thrombopoietin and which other essential cytokine?",
                    options: [
                        "Interleukin 2",
                        "Interleukin 6",
                        "Tumor necrosis factor",
                        "Interferon gamma"
                    ],
                    correctAnswer: 1,
                    explanation: "Thrombopoietin from the liver and Interleukin-6 are both absolutely essential to commit the common myeloid progenitor cells to differentiate into platelet-producing megakaryocytes."
                },
                {
                    question: "The 'Bombay Phenotype' is a rare genetic condition characterized by the complete inability of the individual to produce:",
                    options: [
                        "The A antigen transferase",
                        "The B antigen transferase",
                        "The precursor H substance",
                        "The Rh-D surface protein"
                    ],
                    correctAnswer: 2,
                    explanation: "Individuals with the Bombay phenotype inherit two recessive 'h' genes. They cannot produce the foundational H substance, meaning A and B enzymes have nothing to attach their specific sugars to."
                },
                {
                    question: "According to Landsteiner's Law, an individual with Blood Type O will naturally possess which antibodies in their blood plasma?",
                    options: [
                        "Only Anti-A antibodies",
                        "Only Anti-B antibodies",
                        "Both Anti-A and Anti-B antibodies",
                        "Neither Anti-A nor Anti-B antibodies"
                    ],
                    correctAnswer: 2,
                    explanation: "Landsteiner's Law dictates that if an antigen is absent on the RBC, the corresponding antibody must be present in the plasma. Type O lacks both A and B antigens, so the plasma must contain both Anti-A and Anti-B antibodies."
                },
                {
                    question: "Prophylactic RhoGAM is administered to an Rh-negative mother to prevent Rh isoimmunization. Postpartum administration must occur within 72 hours only if:",
                    options: [
                        "The newborn is confirmed to be Rh-negative",
                        "The newborn is confirmed to be Rh-positive",
                        "The mother experienced a normal vaginal delivery",
                        "The father is confirmed to be Rh-negative"
                    ],
                    correctAnswer: 1,
                    explanation: "RhoGAM provides passive antibodies to clear fetal Rh antigens from the mother's blood before she can mount an immune response. This is only necessary if the baby is actually Rh-positive."
                },
                {
                    question: "Which of the following transfusion hazards is primarily characterized by non-cardiogenic pulmonary edema and is a leading cause of transfusion-related mortality?",
                    options: [
                        "Transfusion Associated Circulatory Overload",
                        "Acute Hemolytic Transfusion Reaction",
                        "Transfusion Related Acute Lung Injury",
                        "Febrile Non Hemolytic Transfusion Reaction"
                    ],
                    correctAnswer: 2,
                    explanation: "TRALI is caused by donor antibodies aggressively attacking the recipient's pulmonary capillaries, leading to fluid leakage into the lungs. Unlike TACO, it usually presents with low or normal blood pressure."
                },
                {
                    question: "During extended storage in the blood bank, packed red blood cells develop a 'Storage Lesion'. Which biochemical change is highly characteristic of this lesion?",
                    options: [
                        "Increased ATP and decreased extracellular potassium",
                        "Decreased ATP and increased extracellular potassium",
                        "Increased 2,3 DPG and increased intracellular calcium",
                        "Decreased 2,3 DPG and decreased extracellular potassium"
                    ],
                    correctAnswer: 1,
                    explanation: "As RBCs age in cold storage, ATP depletes. This causes the sodium-potassium pumps to fail, allowing intracellular potassium to leak heavily into the surrounding plasma, posing a risk of hyperkalemia upon transfusion."
                },
                {
                    question: "In component blood therapy, a patient suffering from critically low fibrinogen levels due to massive obstetric hemorrhage should be treated primarily with:",

                        "Packed red blood cells",
                        "Fresh frozen plasma",
                        "Platelet concentrates",
                        "Cryoprecipitate"
                    ],
                    correctAnswer: 3,
                    explanation: "Cryoprecipitate is a specific, highly concentrated fraction of plasma that is exceptionally rich in Fibrinogen, Factor VIII, and von Willebrand factor, making it the ideal treatment for severe hypofibrinogenemia."
                },
                {
                    question: "Which specific immune cell is the primary coordinator of the cell-mediated adaptive immune response and is the primary target of the HIV virus?",

                        "B lymphocyte",
                        "CD8 Cytotoxic T cell",
                        "CD4 Helper T cell",
                        "Tissue macrophage"

                    correctAnswer: 2,
                    explanation: "The CD4+ Helper T-cell coordinates the entire adaptive immune response. HIV targets these cells by binding to the CD4 receptor via its gp120 envelope glycoprotein."
                },
                {
                    question: "In the structure of the Human Immunodeficiency Virus, which viral protein specifically forms the cone-shaped capsid that protects the viral RNA?",
                    options: [
                        "Glycoprotein 120",
                        "Glycoprotein 41",
                        "Protein 24",
                        "Protein 17"
                    ],
                    correctAnswer: 2,
                    explanation: "The core of the HIV virus consists of a distinctive cone-shaped capsid constructed entirely from the viral protein p24. The p17 protein forms the underlying matrix."
                },
                {
                    question: "Wiskott-Aldrich Syndrome is a severe condition characterized by a combined cellular and humoral immunodeficiency. How is this disease classified?",
                    options: [
                        "As a secondary acquired immunodeficiency",
                        "As a primary congenital immunodeficiency",
                        "As a systemic autoimmune disorder",
                        "As an acute hypersensitivity reaction"
                    ],
                    correctAnswer: 1,
                    explanation: "Immunodeficiencies are divided into Primary (genetic/congenital) and Secondary (acquired, like HIV). Wiskott-Aldrich is an inherited, primary condition."
                },
                {
                    question: "In physiological engineering analogies, a system that detects a deviation and accelerates that change until a 'once-and-for-all' event occurs is known as:",
                    options: [
                        "Negative feedback",
                        "Positive feedback",
                        "Homeostatic balance",
                        "Feedforward regulation"
                    ],
                    correctAnswer: 1,
                    explanation: "Positive feedback accelerates a physiological process. In the driving analogy, it is like pressing harder on the accelerator when already speeding, resulting in a 'once-and-for-all' catastrophic crash."

                    correctAnswer: 2,
                    explanation: "Low potassium (hypokalemia) forces cells to heavily excrete hydrogen ions out of the body in a desperate attempt to retain internal potassium, directly leading to systemic Metabolic Alkalosis."

                {
                    question: "A competitive enzyme inhibitor directly halts a specific biochemical reaction by physically competing for and aggressively binding directly to the enzyme's:",
                    options: [
                        "Distant external allosteric site",

                        "Attached non protein coenzyme"

            ],
            // 🟢 ANATOMY (ANA 211)
            "ANA211": [
                {
                    question: "A patient presents with 'wrist drop' following a mid-shaft fracture of the humerus. Which nerve has been compromised in the radial groove?",
                    options: [
                        "Median Nerve",
                        "Ulnar Nerve",
                        "Axillary Nerve",
                        "Radial Nerve"
                    ],
                    correctAnswer: 3,
                    explanation: "The radial nerve spirals around the posterior surface of the humerus in the radial groove. A mid-shaft fracture commonly damages it here, denervating the extensor muscles of the forearm, causing wrist drop."
                }
            ]
        };

        let selectedQuestions = [];
        let userAnswers = [];
        let questionsAttemptedCount = 0;
        let timerInterval;
        let currentQuestionIndex = 0; // NEW: Pagination Tracker

        // 2. THE ENGINE IGNITION
        function igniteEngine(courseCode) {
            if (!courseVault[courseCode] || courseVault[courseCode].length === 0) {
                alert("System Notice: The Director is currently uploading materials for " + courseCode + ".");
                return;
            }

            document.getElementById('vault-intro').classList.add('hidden');
            document.getElementById('exam-stats').classList.remove('hidden');
            document.getElementById('exam-container').classList.remove('hidden');
            document.getElementById('exam-timer').classList.remove('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            
            document.getElementById('course-title-display').innerText = courseCode + " SIMULATION";

            let targetDatabase = courseVault[courseCode];
            let shuffled = [...targetDatabase];
            
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            // Benchmark set to strictly 35 questions
            selectedQuestions = shuffled.slice(0, Math.min(35, shuffled.length));
            userAnswers = new Array(selectedQuestions.length).fill(null);
            currentQuestionIndex = 0; // Reset index
            
            updateProgressUI();
            startTimer(15 * 60); // 15 MINUTES
            renderCurrentQuestion(); // Call Pagination Engine
        }

        // 3. THE 15-MINUTE TIMER
        function startTimer(durationInSeconds) {
            let timer = durationInSeconds;
            const display = document.getElementById('time-display');
            
            timerInterval = setInterval(function () {
                let minutes = parseInt(timer / 60, 10);
                let seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (timer < 300) {
                    display.classList.remove('text-white');
                    display.classList.add('text-red-500', 'animate-pulse');
                }

                if (--timer < 0) {
                    clearInterval(timerInterval);
                    calculateScore(); 
                }
            }, 1000);
        }

        // 4. THE PAGINATION RENDER ENGINE
        function renderCurrentQuestion() {
            const container = document.getElementById('exam-container');
            const q = selectedQuestions[currentQuestionIndex];
            const qIndex = currentQuestionIndex;
            
            let optionsHTML = '';
            q.options.forEach((opt, optIndex) => {
                // Check if user already answered this when going back/forward
                const isChecked = userAnswers[qIndex] === optIndex ? 'checked' : '';
                
                optionsHTML += `
                    <label class="block relative mb-3 cursor-pointer option-label group">
                        <input type="radio" name="q${qIndex}" value="${optIndex}" onchange="recordAnswer(${qIndex}, ${optIndex})" ${isChecked}>
                        <div class="option-box flex items-center p-4 border border-slate-700 bg-slate-800/50 rounded-xl group-hover:bg-slate-700 transition-colors">
                            <div class="radio-indicator w-5 h-5 rounded-full border-2 border-slate-500 mr-4 flex-shrink-0 transition-colors"></div>
                            <span class="text-sm md:text-base text-slate-300 font-medium">${opt}</span>
                        </div>
                    </label>
                `;
            });

            // Dynamic Navigation Buttons Logic
            const isFirst = qIndex === 0;
            const isLast = qIndex === selectedQuestions.length - 1;
            
            let navHTML = `<div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-700/50">`;
            
            // Previous Button (Hidden on first question)
            if (!isFirst) {
                navHTML += `<button onclick="prevQuestion()" class="px-5 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl transition-colors active:scale-95 flex items-center gap-2 text-sm"><i class="fas fa-arrow-left"></i> PREV</button>`;
            } else {
                navHTML += `<div></div>`; // Empty div to keep flexbox layout aligned
            }
            
            // Next OR Submit Button
            if (!isLast) {
                navHTML += `<button onclick="nextQuestion()" class="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-black rounded-xl transition-colors active:scale-95 flex items-center gap-2 shadow-[0_5px_15px_rgba(6,182,212,0.3)] tracking-widest">NEXT <i class="fas fa-arrow-right"></i></button>`;
            } else {
                navHTML += `<button onclick="calculateScore()" class="px-8 py-3 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black rounded-xl transition-all shadow-[0_5px_15px_rgba(16,185,129,0.4)] flex items-center gap-2 tracking-widest border border-emerald-400/50">SUBMIT <i class="fas fa-fingerprint"></i></button>`;
            }
            
            navHTML += `</div>`;

            // Compile the Final Question Card
            const questionHTML = `
                <div class="reveal-on-scroll bg-slate-800/80 backdrop-blur-sm p-6 md:p-8 rounded-3xl border border-slate-700 shadow-xl w-full">
                    <div class="flex items-start gap-4 mb-6 pb-4">
                        <div class="bg-gradient-to-br from-cyan-600 to-blue-600 text-white font-black h-10 w-10 rounded-xl flex items-center justify-center flex-shrink-0 shadow-inner text-lg border border-cyan-400/30">
                            ${qIndex + 1}
                        </div>
                        <h3 class="text-slate-100 font-bold leading-relaxed text-lg md:text-xl tracking-tight mt-1">${q.question}</h3>
                    </div>
                    <div class="pl-0 md:pl-14">
                        ${optionsHTML}
                    </div>
                    ${navHTML}
                </div>
            `;
            
            container.innerHTML = questionHTML;
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll to top for mobile UX
        }

        // Pagination Controllers
        function nextQuestion() {
            if (currentQuestionIndex < selectedQuestions.length - 1) {
                currentQuestionIndex++;
                renderCurrentQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderCurrentQuestion();
            }
        }

        // Answer Tracking
        function recordAnswer(qIndex, optIndex) {
            if (userAnswers[qIndex] === null) {
                questionsAttemptedCount++;
                updateProgressUI();
            }
            userAnswers[qIndex] = optIndex;
        }

        function updateProgressUI() {
            const total = selectedQuestions.length;
            document.getElementById('questions-attempted').innerText = `${questionsAttemptedCount} / ${total} Answered`;
            const percentage = (questionsAttemptedCount / total) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        // 5. THE GRADING ENGINE
        function calculateScore() {
            clearInterval(timerInterval);

            let score = 0;
            selectedQuestions.forEach((q, index) => {
                if (userAnswers[index] === q.correctAnswer) {
                    score++;
                }
            });

            document.getElementById('exam-stats').classList.add('hidden');
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('exam-timer').classList.add('hidden');
            document.getElementById('progress-container').classList.add('hidden');
            
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.classList.remove('hidden');
            
            const scoreElement = document.getElementById('final-score');
            let currentScore = 0;
            const scoreInterval = setInterval(() => {
                if (currentScore >= score) {
                    clearInterval(scoreInterval);
                    scoreElement.innerText = `${score} / ${selectedQuestions.length}`;
                    
                    const percentage = (score / selectedQuestions.length) * 100;
                    if (percentage >= 70) scoreElement.classList.add('text-emerald-400');
                    else if (percentage >= 50) scoreElement.classList.add('text-yellow-400');
                    else scoreElement.classList.add('text-red-400');
                } else {
                    currentScore++;
                    scoreElement.innerText = `${currentScore} / ${selectedQuestions.length}`;
                }
            }, 30);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 6. THE POST-MORTEM REVIEW ENGINE (Kept as continuous scroll for easy reading)
        function reviewExam() {
            document.getElementById('score-display').classList.add('hidden');
            const container = document.getElementById('exam-container');
            container.classList.remove('hidden');
            container.innerHTML = ''; 

            container.innerHTML = `
                <div class="bg-cyan-900/30 border border-cyan-500/50 p-4 rounded-xl mb-6 text-center">
                    <h2 class="text-cyan-400 font-black tracking-widest uppercase"><i class="fas fa-search"></i> Diagnostic Review Mode</h2>
                    <p class="text-xs text-slate-400 mt-1">Review your mistakes. Read the Director's Rationales.</p>
                </div>
            `;

            selectedQuestions.forEach((q, qIndex) => {
                let optionsHTML = '';
                const userAns = userAnswers[qIndex];
                
                q.options.forEach((opt, optIndex) => {
                    let bgClass = 'bg-slate-800/50';
                    let borderClass = 'border-slate-700';
                    let textClass = 'text-slate-300';
                    let iconHTML = '';

                    if (optIndex === q.correctAnswer) {
                        bgClass = 'bg-emerald-900/30';
                        borderClass = 'border-emerald-500';
                        textClass = 'text-emerald-400 font-bold';
                        iconHTML = '<i class="fas fa-check-circle text-emerald-500 ml-auto text-xl"></i>';
                    } else if (optIndex === userAns && userAns !== q.correctAnswer) {
                        bgClass = 'bg-red-900/30';
                        borderClass = 'border-red-500';
                        textClass = 'text-red-400';
                        iconHTML = '<i class="fas fa-times-circle text-red-500 ml-auto text-xl"></i>';
                    }

                    optionsHTML += `
                        <div class="flex items-center p-4 border ${borderClass} ${bgClass} rounded-xl mb-3 transition-all">
                            <span class="text-sm md:text-base ${textClass}">${opt}</span>
                            ${iconHTML}
                        </div>
                    `;
                });

                const explanationHTML = q.explanation ? `
                    <div class="mt-4 p-4 bg-blue-900/20 border border-blue-500/30 rounded-xl">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-2 flex items-center gap-2">
                            <i class="fas fa-lightbulb"></i> Director's Rationale
                        </span>
                        <p class="text-sm text-blue-100 leading-relaxed">${q.explanation}</p>
                    </div>
                ` : '';

                const questionHTML = `
                    <div class="bg-slate-800/80 backdrop-blur-sm p-6 rounded-2xl border border-slate-700 shadow-lg mb-6">
                        <div class="flex items-start gap-4 mb-5 border-b border-slate-700/50 pb-4">
                            <div class="bg-slate-700 text-slate-300 font-black h-8 w-8 rounded-lg flex items-center justify-center flex-shrink-0 shadow-inner">
                                ${qIndex + 1}
                            </div>
                            <h3 class="text-slate-100 font-bold leading-relaxed text-lg tracking-tight">${q.question}</h3>
                        </div>
                        <div class="pl-0 md:pl-12">
                            ${optionsHTML}
                            ${explanationHTML}
                        </div>
                    </div>
                `;
                container.innerHTML += questionHTML;
            });
            
            container.innerHTML += `
                <div class="text-center mt-8 pb-10 flex flex-col md:flex-row justify-center gap-4">
                    <button onclick="backToScore()" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl transition-colors active:scale-95 shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-left"></i> BACK TO SCORE
                    </button>
                    <button onclick="location.reload()" class="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl transition-colors active:scale-95 shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-redo"></i> RE-ROLL VAULT
                    </button>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToScore() {
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('score-display').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
