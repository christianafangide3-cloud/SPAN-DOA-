<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBT Session | Splendid's Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#020617',    /* Slate 950 */
                            card: '#0f172a',    /* Slate 900 */
                            accent: '#06b6d4',  /* Cyan 500 */
                            success: '#10b981', /* Emerald 500 */
                            danger: '#f43f5e'   /* Rose 500 */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=JetBrains+Mono:wght@500;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Prevent copying questions */
        }

        .timer-font { font-family: 'JetBrains Mono', monospace; }

        /* Premium Glassmorphism */
        .glass-nav { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Option Card Styles */
        .option-card { 
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
            cursor: pointer; 
        }
        
        @media (hover: hover) {
            .option-card:hover { 
                transform: translateX(5px); 
                border-color: rgba(6, 182, 212, 0.5); 
                background-color: rgba(6, 182, 212, 0.1); 
            }
        }
        
        .selected-option { 
            background-color: #06b6d4 !important; 
            color: #020617 !important; 
            border-color: #06b6d4 !important; 
            font-weight: 800 !important;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        /* Review Mode Styles */
        .review-correct { 
            border-color: #10b981 !important; 
            background-color: rgba(16, 185, 129, 0.15) !important; 
            color: #34d399 !important; 
        }
        .review-wrong { 
            border-color: #f43f5e !important; 
            background-color: rgba(244, 63, 94, 0.15) !important; 
            color: #fb7185 !important; 
        }

        .btn-glow {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
            transform: translateY(-2px);
        }
        .btn-glow:active { transform: scale(0.95); }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <!-- Top Navigation -->
    <div class="glass-nav sticky top-0 z-50 px-4 md:px-8 py-4 flex justify-between items-center shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div>
            <h1 class="text-[10px] md:text-xs font-black text-cyan-400 uppercase tracking-[0.2em]" id="header-course">LOADING...</h1>
            <div class="font-bold text-white text-sm md:text-base tracking-tight">Active Assessment</div>
        </div>
        <div id="timer-wrapper" class="bg-slate-900/80 px-4 py-2 rounded-xl flex items-center gap-2 border border-slate-700 shadow-inner transition-colors">
            <i class="fas fa-clock text-cyan-400 animate-pulse text-sm"></i>
            <span id="timer" class="timer-font font-bold text-white text-lg tracking-wider">10:00</span>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="w-full bg-slate-900 h-1.5 shadow-inner">
        <div id="progress-bar" class="bg-gradient-to-r from-cyan-500 to-blue-500 h-1.5 transition-all duration-300 shadow-[0_0_10px_rgba(6,182,212,0.8)]" style="width: 0%"></div>
    </div>

    <!-- Main Exam Area -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 max-w-3xl mx-auto w-full relative z-10" id="quiz-main">
        <div class="w-full glass-card rounded-3xl overflow-hidden fade-in">
            <div class="p-6 md:p-10">
                <div class="flex justify-between items-start mb-6">
                    <span class="bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 text-[10px] md:text-xs font-black px-3 py-1.5 rounded-full uppercase tracking-widest">
                        Q: <span id="q-number">1</span>
                    </span>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
                        Exam Protocol
                    </span>
                </div>
                
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-white leading-relaxed mb-8 tracking-tight">Loading Question Data...</h2>
                
                <div id="options-container" class="space-y-3">
                    <!-- Options Injected Here -->
                </div>
            </div>
            
            <div class="bg-slate-900/80 p-5 border-t border-slate-800 flex justify-between items-center">
                <button onclick="prevQuestion()" id="btn-prev" class="px-6 py-3 rounded-xl text-slate-400 font-bold hover:text-white hover:bg-slate-800 transition-colors disabled:opacity-30 disabled:hover:bg-transparent disabled:cursor-not-allowed">
                    <i class="fas fa-arrow-left mr-2"></i> Prev
                </button>
                <button onclick="nextQuestion()" id="btn-next" class="btn-glow px-8 py-3 rounded-xl text-white font-bold uppercase tracking-widest text-sm flex items-center shadow-lg">
                    Next <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Deep Review Area -->
    <div id="review-area" class="hidden max-w-4xl mx-auto w-full p-4 md:p-8 pb-24 space-y-6 fade-in relative z-10">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white tracking-tighter"><i class="fas fa-search text-cyan-400 mr-2"></i> Deep Review Analysis</h2>
            <p class="text-slate-400 font-medium text-sm mt-2">Evaluate your performance against the master key.</p>
        </div>
        
        <div id="review-list" class="space-y-6">
            <!-- Review Items Injected Here -->
        </div>
        
        <div class="fixed bottom-0 left-0 w-full p-4 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 flex justify-center z-50">
            <button onclick="window.location.href='cbt.html'" class="btn-glow px-10 py-4 rounded-xl font-black uppercase tracking-widest text-white shadow-[0_0_20px_rgba(6,182,212,0.4)] hover:scale-105 transition-transform flex items-center gap-3">
                <i class="fas fa-check-double"></i> Conclude Review
            </button>
        </div>
    </div>

    <!-- Result Modal (Glassmorphism) -->
    <div id="result-modal" class="fixed inset-0 bg-slate-950/80 z-50 hidden flex items-center justify-center backdrop-blur-md p-4">
        <div class="glass-card rounded-[2rem] p-8 md:p-10 max-w-md w-full text-center relative overflow-hidden fade-in border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.15)]">
            <div class="absolute -right-10 -top-10 text-[10rem] text-cyan-500/5 rotate-12"><i class="fas fa-chart-pie"></i></div>
            
            <div class="relative z-10">
                <div id="result-icon" class="h-24 w-24 bg-gradient-to-br from-cyan-500 to-blue-600 text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-[0_0_30px_rgba(6,182,212,0.4)]">
                    <i class="fas fa-trophy"></i>
                </div>
                
                <h2 id="result-title" class="text-3xl font-black text-white mb-2 tracking-tight">Protocol Complete</h2>
                <p class="text-slate-400 font-medium mb-6">Diagnostic Score: <span id="score-display" class="font-black text-cyan-400 text-2xl ml-1">0%</span></p>
                
                <div id="unlock-msg" class="bg-emerald-500/20 border border-emerald-500/50 p-4 rounded-2xl mb-8 hidden">
                    <p class="text-xs font-black text-emerald-400 uppercase tracking-widest flex items-center justify-center gap-2">
                        <i class="fas fa-unlock-alt"></i> Next Level Unlocked
                    </p>
                </div>
                
                <div class="space-y-4">
                    <button onclick="startReview()" class="w-full py-4 bg-slate-800 border border-slate-700 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-search"></i> Deep Review
                    </button>
                    <button onclick="window.location.href='cbt.html'" class="w-full py-4 btn-glow text-white rounded-xl font-bold uppercase tracking-widest text-sm">
                        Return to Hub
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load the User's External Question Bank -->
    <!-- Assuming the user has their files linked or combined into questions.js defining QUESTION_VAULT -->
    <script src="questions.js"></script>

    <!-- Firebase & Security Core -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrF_INEtL9bZKAoDPYCuTaVMRWGAdbcew",
            authDomain: "splendids-academy-v2.firebaseapp.com",
            projectId: "splendids-academy-v2",
            storageBucket: "splendids-academy-v2.firebasestorage.app",
            messagingSenderId: "573697150601",
            appId: "1:573697150601:web:74c556c85b6be053018058",
            measurementId: "G-VVDT1PMHNX" 
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app); 
        const auth = getAuth(app);

        // --- 15-MINUTE INACTIVITY LOCKOUT PROTOCOL ---
        let inactivityTimer;
        const INACTIVITY_LIMIT = 15 * 60 * 1000; 

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            if (auth.currentUser) {
                inactivityTimer = setTimeout(() => {
                    signOut(auth).then(() => {
                        localStorage.setItem('session_timeout', 'true');
                        window.location.href = "index.html"; 
                    });
                }, INACTIVITY_LIMIT);
            }
        }

        ['click', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(evt => 
            document.addEventListener(evt, resetInactivityTimer, { passive: true })
        );

        onAuthStateChanged(auth, (user) => {
            if (user) {
                resetInactivityTimer();
            } else {
                window.location.href = "index.html";
            }
        });
    </script>

    <!-- Quiz Engine Logic -->
    <script>
        // 1. URL Parameters & Setup
        const urlParams = new URLSearchParams(window.location.search);
        const COURSE_CODE = urlParams.get('course') || 'ANA 211';
        const LEVEL = urlParams.get('level') || 'beginner';

        document.getElementById('header-course').textContent = `${COURSE_CODE} • ${LEVEL.toUpperCase()}`;

        // 2. Fetch Questions (Robust checks for the Vaults)
        let questions = [];
        
        // Attempt to find the specific course and level in the global QUESTION_VAULT
        if (typeof QUESTION_VAULT !== 'undefined' && QUESTION_VAULT[COURSE_CODE] && QUESTION_VAULT[COURSE_CODE][LEVEL]) {
            questions = QUESTION_VAULT[COURSE_CODE][LEVEL];
        } else if (typeof QUESTION_VAULT_SEG_A !== 'undefined' && QUESTION_VAULT_SEG_A[COURSE_CODE] && QUESTION_VAULT_SEG_A[COURSE_CODE][LEVEL]) {
            questions = QUESTION_VAULT_SEG_A[COURSE_CODE][LEVEL];
        } else if (typeof QUESTION_VAULT_SEG_B1 !== 'undefined' && QUESTION_VAULT_SEG_B1[COURSE_CODE] && QUESTION_VAULT_SEG_B1[COURSE_CODE][LEVEL]) {
            questions = QUESTION_VAULT_SEG_B1[COURSE_CODE][LEVEL];
        } else if (typeof QUESTION_VAULT_SEG_B2 !== 'undefined' && QUESTION_VAULT_SEG_B2[COURSE_CODE] && QUESTION_VAULT_SEG_B2[COURSE_CODE][LEVEL]) {
            questions = QUESTION_VAULT_SEG_B2[COURSE_CODE][LEVEL];
        } else if (typeof QUESTION_VAULT_SEG_C !== 'undefined' && QUESTION_VAULT_SEG_C[COURSE_CODE] && QUESTION_VAULT_SEG_C[COURSE_CODE][LEVEL]) {
            questions = QUESTION_VAULT_SEG_C[COURSE_CODE][LEVEL];
        } else {
            // Fallback for testing UI without JS files attached
            alert(`[SYSTEM ALERT] Database link failed for ${COURSE_CODE} (${LEVEL}). Vault undefined.`);
            questions = [{ q: "Fatal Error: Question Vault not linked correctly.", options: ["Abort", "Retry"], a: 0 }];
        }

        // Shuffle the selected array securely
        questions = [...questions].sort(() => Math.random() - 0.5);

        // 3. Engine State Variables
        let currentQ = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let timeLeft = 600; // 10 Minutes Default
        let timerInterval;

        window.onload = function() { 
            loadQuestion(); 
            startTimer(); 
        };

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-number').textContent = `${currentQ + 1} / ${questions.length}`;
            
            // Support both data structures (q.question or q.q)
            document.getElementById('question-text').textContent = q.question || q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = `option-card p-5 rounded-2xl font-medium text-slate-300 flex items-center gap-4`;
                
                // Highlight if previously selected
                if(userAnswers[currentQ] === index) {
                    btn.classList.add('selected-option');
                }
                
                btn.onclick = () => { 
                    userAnswers[currentQ] = index; 
                    loadQuestion(); // Re-render to show selection
                };
                
                const letter = String.fromCharCode(65 + index);
                btn.innerHTML = `
                    <div class="h-8 w-8 rounded-full border-2 border-current flex items-center justify-center text-xs font-black flex-shrink-0">${letter}</div>
                    <span class="text-sm md:text-base leading-snug">${opt}</span>
                `;
                container.appendChild(btn);
            });

            // Update Progress Bar
            const progressPct = ((currentQ + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
            
            // Button States
            document.getElementById('btn-prev').disabled = currentQ === 0;
            const nextBtn = document.getElementById('btn-next');
            
            if(currentQ === questions.length - 1) {
                nextBtn.innerHTML = `Finalize <i class="fas fa-fingerprint ml-2"></i>`;
                // Morph to submission style
                nextBtn.className = "px-8 py-3 rounded-xl text-white font-black uppercase tracking-widest text-sm flex items-center shadow-[0_0_20px_rgba(16,185,129,0.4)] bg-gradient-to-r from-emerald-500 to-teal-500 hover:scale-105 transition-transform";
            } else {
                nextBtn.innerHTML = `Next <i class="fas fa-arrow-right ml-2"></i>`;
                nextBtn.className = "btn-glow px-8 py-3 rounded-xl text-white font-bold uppercase tracking-widest text-sm flex items-center shadow-lg";
            }
        }

        function nextQuestion() {
            if(currentQ < questions.length - 1) { 
                currentQ++; 
                loadQuestion(); 
            } else { 
                finishQuiz(); 
            }
        }

        function prevQuestion() {
            if(currentQ > 0) { 
                currentQ--; 
                loadQuestion(); 
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            let correct = 0;
            
            questions.forEach((q, i) => { 
                const actualAnswer = q.correctAnswer !== undefined ? q.correctAnswer : q.a;
                if(userAnswers[i] === actualAnswer) correct++; 
            });
            
            const score = Math.round((correct / questions.length) * 100);
            
            document.getElementById('result-modal').classList.remove('hidden');
            document.getElementById('score-display').textContent = `${score}%`;
            
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            
            if(score >= 50) {
                // Distinction / Pass Logic
                document.getElementById('unlock-msg').classList.remove('hidden');
                title.textContent = "Protocol Cleared";
                title.className = "text-3xl font-black text-white mb-2 tracking-tight";
                icon.className = "h-24 w-24 bg-gradient-to-br from-emerald-400 to-teal-600 text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-[0_0_30px_rgba(16,185,129,0.4)]";
                icon.innerHTML = '<i class="fas fa-shield-check"></i>';
                
                // SAVE PROGRESS TO UNLOCK NEXT LEVEL IN CBT.HTML
                localStorage.setItem(`${COURSE_CODE}_${LEVEL}_passed`, 'true');
            } else {
                // Failure Logic
                document.getElementById('unlock-msg').classList.add('hidden');
                title.textContent = "Protocol Failed";
                title.className = "text-3xl font-black text-rose-400 mb-2 tracking-tight";
                icon.className = "h-24 w-24 bg-gradient-to-br from-rose-500 to-red-600 text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-[0_0_30px_rgba(244,63,94,0.4)]";
                icon.innerHTML = '<i class="fas fa-times"></i>';
            }
        }

        function startReview() {
            document.getElementById('result-modal').classList.add('hidden');
            document.getElementById('quiz-main').classList.add('hidden');
            document.getElementById('progress-bar').parentElement.classList.add('hidden');
            document.getElementById('timer-wrapper').classList.add('hidden');
            
            document.getElementById('review-area').classList.remove('hidden');
            
            const list = document.getElementById('review-list');
            list.innerHTML = '';

            questions.forEach((q, i) => {
                const userChoice = userAnswers[i];
                const actualAnswer = q.correctAnswer !== undefined ? q.correctAnswer : q.a;
                const isCorrect = userChoice === actualAnswer;
                const qText = q.question || q.q;
                
                const div = document.createElement('div');
                div.className = `glass-card p-6 md:p-8 rounded-3xl border-l-4 ${isCorrect ? 'border-l-emerald-500' : 'border-l-rose-500'}`;
                
                let optionsHtml = '';
                q.options.forEach((opt, idx) => {
                    let classes = "p-4 rounded-xl border border-white/5 mb-3 text-sm md:text-base text-slate-400 bg-slate-900/50";
                    let iconHtml = `<div class="w-6 h-6 rounded-full border border-slate-600 flex items-center justify-center text-[10px] mr-3 flex-shrink-0">${String.fromCharCode(65 + idx)}</div>`;
                    
                    if (idx === actualAnswer) {
                        classes = "review-correct p-4 rounded-xl border mb-3 text-sm md:text-base flex items-center font-bold"; 
                        iconHtml = `<i class="fas fa-check-circle mr-3 text-lg"></i>`;
                    }
                    else if (idx === userChoice && !isCorrect) {
                        classes = "review-wrong p-4 rounded-xl border mb-3 text-sm md:text-base flex items-center font-bold";
                        iconHtml = `<i class="fas fa-times-circle mr-3 text-lg"></i>`;
                    }
                    
                    optionsHtml += `<div class="${classes} flex items-center">${iconHtml}<span>${opt}</span></div>`;
                });

                div.innerHTML = `
                    <div class="flex items-start gap-4 mb-6">
                        <span class="text-xs font-black ${isCorrect ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20' : 'text-rose-400 bg-rose-500/10 border-rose-500/20'} px-3 py-1.5 rounded-lg border flex-shrink-0">Q${i+1}</span>
                        <h3 class="font-bold text-white text-lg leading-snug">${qText}</h3>
                    </div>
                    <div class="pl-0 md:pl-14">
                        ${optionsHtml}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const wrapper = document.getElementById('timer-wrapper');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                timerEl.textContent = `${m}:${s}`;
                
                if(timeLeft <= 60) {
                    wrapper.classList.replace('border-slate-700', 'border-rose-500');
                    wrapper.classList.replace('bg-slate-900/80', 'bg-rose-950/80');
                    timerEl.classList.replace('text-white', 'text-rose-400');
                    document.querySelector('.fa-clock').classList.replace('text-cyan-400', 'text-rose-500');
                }
                
                if(timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    finishQuiz(); 
                }
            }, 1000);
        }
    </script>
</body>
</html>
